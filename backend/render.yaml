services:
  - type: web
    name: niarad-backend
    runtime: python
    pythonVersion: 3.10
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        scope: run
      - key: PYTHON_VERSION
        value: 3.10
    disk:
      - name: data
        mountPath: /app/data
        sizeGB: 1