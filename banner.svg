<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono');

      .bg { fill: #060910; }
      .grid-h line, .grid-v line { stroke: rgba(0,255,170,0.04); stroke-width: 1; }

      .title {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        fill: #ffffff;
        letter-spacing: 20px;
        animation: flicker 8s infinite;
      }
      .sub {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00FFAA;
        letter-spacing: 6px;
        animation: fadeIn 1.2s ease forwards;
        opacity: 0;
      }
      .tag {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 9px;
        fill: #1C2A3A;
        letter-spacing: 4px;
      }
      .scan {
        fill: none;
        stroke: #00FFAA;
        stroke-width: 1;
        opacity: 0.15;
        animation: scan 4s linear infinite;
      }
      .corner { stroke: #00FFAA; stroke-width: 1; fill: none; opacity: 0.4; }
      .blink { animation: blink 1s step-end infinite; fill: #00FFAA; font-family: monospace; font-size: 72px; }

      @keyframes flicker {
        0%,89%,100% { opacity: 1; }
        90% { opacity: 0.8; filter: url(#glitch); }
        91% { opacity: 1; }
        92% { opacity: 0.9; }
        93% { opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        10%  { opacity: 0.15; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50%     { opacity: 0; }
      }
      @keyframes pulse {
        0%,100% { opacity: 0.4; }
        50%     { opacity: 1; }
      }
      .dot1 { animation: pulse 2s infinite 0s; }
      .dot2 { animation: pulse 2s infinite 0.3s; }
      .dot3 { animation: pulse 2s infinite 0.6s; }
    </style>
    <filter id="glitch">
      <feColorMatrix type="saturate" values="3"/>
      <feOffset dx="2" dy="0" result="r"/>
      <feOffset dx="-2" dy="0" result="b"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" class="bg"/>

  <!-- Grid lines horizontal -->
  <g class="grid-h">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
  </g>
  <!-- Grid lines vertical -->
  <g class="grid-v">
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="2" class="scan"/>

  <!-- Corner brackets -->
  <polyline points="20,20 20,8 32,8" class="corner"/>
  <polyline points="868,20 868,8 856,8" class="corner"/>
  <polyline points="20,180 20,192 32,192" class="corner"/>
  <polyline points="868,180 868,192 856,192" class="corner"/>

  <!-- Status dots top left -->
  <circle cx="36" cy="30" r="3" fill="#00FFAA" class="dot1"/>
  <circle cx="48" cy="30" r="3" fill="#00FFAA" class="dot2"/>
  <circle cx="60" cy="30" r="3" fill="#00FFAA" class="dot3"/>

  <!-- Tag top right -->
  <text x="864" y="32" text-anchor="end" class="tag">OFFLINE SECURE</text>

  <!-- Main title -->
  <text x="450" y="120" text-anchor="middle" class="title">NIARAD</text>

  <!-- Subtitle -->
  <text x="450" y="155" text-anchor="middle" class="sub" style="animation-delay:0.6s">
    OFFLINE AI COMMAND CENTER
  </text>

  <!-- Bottom tag -->
  <text x="450" y="185" text-anchor="middle" class="tag">LOCAL LLM // ZERO TELEMETRY // PRIVACY-FIRST RAG</text>
</svg>
